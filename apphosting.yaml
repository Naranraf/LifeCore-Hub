kind: "AppHostingYaml"
schemaVersion: "v1"

# Configuración de los scripts (Optimizado para Vite)
scripts:
  build: "npm run build && ls -R dist"
  run: "npm run start:prod" # Usamos el 'serve' que instalamos localmente para máxima velocidad

# Configuración del entorno y Secretos
env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: VITE_FIREBASE_API_KEY
    value: "AIzaSyDbScQqZ2rFzaSyZeGJyGSxeVfpzB1l68A"
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: "lyfecore-hub.firebaseapp.com"
  - variable: VITE_FIREBASE_PROJECT_ID
    value: "lyfecore-hub"

# Configuración de recursos (Blindaje de presupuesto)
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 5
